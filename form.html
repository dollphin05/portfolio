<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>정보 입력 폼</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 30px;
    }
    form {
      display: inline-block;
      text-align: left;
      border: 1px solid #ccc;
      padding: 20px;
      border-radius: 10px;
    }
    fieldset {
      margin-bottom: 20px;
    }
    input, select, textarea {
      width: 100%;
      margin-top: 5px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

  <h2>📋 정보 입력 폼</h2>

  <form>
    <fieldset>
      <legend>기본 정보</legend>
      
      이름:  
      <input type="text" placeholder="이름을 입력하세요" required>

      이메일:  
      <input type="email" placeholder="이메일을 입력하세요" required>

      학년 선택:  
      <select required>
        <option value="">-- 선택하세요 --</option>
        <option>1학년</option>
        <option>2학년</option>
        <option>3학년</option>
        <option>4학년</option
                     </select>

      좋아하는 색:  
      <input list="colors" placeholder="색을 선택하거나 직접 입력">
      <datalist id="colors">
        <option value="빨강">
        <option value="노랑">
        <option value="파랑">
        <option value="초록">
      </datalist>
    </fieldset>

    <fieldset>
      <legend>관심 정보</legend>

      관심사(중복 선택 가능):<br>
      <input type="checkbox" id="coding"> 코딩  
      <input type="checkbox" id="design"> 디자인  
      <input type="checkbox" id="music"> 음악<br><br>

      좋아하는 동물:<br>
      <input type="radio" name="animal" value="강아지"> 강아지  
      <input type="radio" name="animal" value="고양이"> 고양이  
      <input type="radio" name="animal" value="햄스터"> 햄스터<br><br>

      하고 싶은 말:  
      <textarea rows="4" placeholder="자유롭게 적어주세요"></textarea>
    </fieldset>

    <button type="submit">제출</button>
  </form>

</body>
</html>
